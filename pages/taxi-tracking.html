<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPatrol</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/tracking.css">
</head>
<body>

  <div class="page-wrap taxi-tracking-page">

    <!-- Header -->
    <header class="tt-header">
      <div class="tt-back-btn"></div>
      <h1 class="tt-title" style="margin-top: 12px;">Driver On The Way</h1>
      <div class="tt-spacer" aria-hidden="true"></div>
    </header>

    <main class="page-content tt-content">
      <img style="width: 100%; height: auto; object-fit: fill; border-radius: 12px;" src="../assets/map-track.png" alt="Map showing driver location" />
      <!-- Bottom card -->
      <section class="tt-card" aria-label="Trip information">
        <!-- Status banner -->
        <div class="tt-banner" id="tt-banner">
          <!-- <div class="tt-banner-emoji" aria-hidden="true">🐶🐱</div>
          <div class="tt-banner-text">
            <div class="tt-banner-label">Estimated Arrival</div>
            <div class="tt-banner-time" id="tt-eta-time">8 min</div>
            <div class="tt-banner-support" id="tt-eta-support">Please be ready at the pickup location.</div>
          </div> -->
          <img src="../assets/progres-trip.png" alt="Map showing driver location" />
        </div>

        <div class="tt-driver-card" aria-label="Driver information">
          <img class="tt-driver-avatar" src="https://i.pravatar.cc/90?img=12" alt="Driver">
          <div class="tt-driver-info">
            <div class="tt-driver-top">
              <div class="tt-driver-name">John Walker</div>
              <div class="tt-driver-rating">
                <span class="tt-star" aria-hidden="true">★</span>
                <span>4.8</span>
                <span class="tt-reviews">(214)</span>
              </div>
            </div>
            <div class="tt-driver-vehicle">Pet Standard · ABC-1234</div>
          </div>
        </div>

        <div class="tt-actions">
          <button class="tt-action-btn" type="button" aria-label="Chat">
            <span class="tt-action-icon" aria-hidden="true">
              <img src="../assets/chat.png" alt="Map showing driver location" />
            </span>
            Chat
          </button>
          <button class="tt-action-btn" type="button" aria-label="Call">
            <span class="tt-action-icon" aria-hidden="true">
              <img src="../assets/call.png" alt="Map showing driver location" />
            </span>
            Call
          </button>
        </div>

        <button class="tt-cancel-btn" type="button">Cancel Ride</button>

        <button class="tt-view-details-btn" id="tt-view-details" type="button">
          Details
        </button>
      </section>

    </main>
  </div>

  <script src="../js/app.js"></script>
  <script>
    // JS is handled in js/app.js; this inline script is intentionally empty.
  </script>
</body>
</html>
