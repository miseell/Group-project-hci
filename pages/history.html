<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawPatrol – History</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/taxi/history.css">
</head>
<body>

  <div class="page-wrap history-page">

    <header class="h-header">
      <button class="h-back-btn" type="button" aria-label="Back">←</button>
      <h1 class="h-title">History</h1>
      <div class="h-spacer" aria-hidden="true"></div>
    </header>

    <main class="page-content h-content">
      <section class="h-empty">
        <div class="h-empty-icon" aria-hidden="true">📚</div>
        <div class="h-empty-title">Use “My Bookings” History</div>
        <div class="h-empty-sub">This page is not used for the Pet Taxi flow. Tap below to open the History tab.</div>
      </section>

      <button class="h-open-booking-btn" type="button" aria-label="Open booking history">
        Open Booking History
      </button>
    </main>

  </div>

  <script src="../js/app.js"></script>
</body>
</html>
