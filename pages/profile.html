<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawPatrol</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

  <div class="page-wrap profile-page">

    <!-- Banner + Logo -->
    <div class="profile-banner">
      <div class="profile-avatar-wrap">
        <img class="profile-avatar" src="../assets/user (2).jpg" alt="User">
      </div>
    </div>

    <!-- Content -->
    <main class="page-content">

      <p class="profile-name">Alex Martinez</p>
      <p class="profile-email">alex.martinez@email.com</p>

      <!-- Menu Group 1 -->
      <div class="menu-group">
        <div class="menu-item">
          <div class="menu-icon-wrap"><img src="../assets/account.png" /></div>
          <span class="menu-label">Profile</span>
          <span class="menu-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </div>
        <div class="menu-item">
          <div class="menu-icon-wrap angle"><img src="../assets/pet.png" /></div>
          <span class="menu-label">Pets</span>
          <span class="menu-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </div>
        <div class="menu-item">
          <div class="menu-icon-wrap"><img src="../assets/notification.png" /></div>
          <span class="menu-label">Notification</span>
          <span class="menu-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </div>
        <div class="menu-item">
          <div class="menu-icon-wrap"><img src="../assets/payment.png" /></div>
          <span class="menu-label">Payment</span>
          <span class="menu-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Menu Group 2 -->
      <div class="menu-group">
        <div class="menu-item">
          <span class="menu-label">About Us</span>
          <span class="menu-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </div>
        <div class="menu-item">
          <span class="menu-label">Terms and Conditions</span>
          <span class="menu-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </div>
        <div class="menu-item">
          <span class="menu-label">Privacy & Policy</span>
          <span class="menu-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Logout -->
      <button class="logout-btn">Log Out</button>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <div class="nav-item" data-page="home">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-label">Home</span>
      </div>
      <div class="nav-item" data-page="search">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="nav-label">Search</span>
      </div>
      <div class="nav-item" data-page="booking">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="nav-label">Booking</span>
      </div>
      <div class="nav-item" data-page="chat">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span class="nav-label">Chat</span>
      </div>
      <div class="nav-item active" data-page="profile">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="nav-label">Profile</span>
      </div>
    </nav>

  </div>

  <script src="../js/app.js"></script>
</body>
</html>
