<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawPatrol – Pet Taxi</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/taxi.css">
</head>
<body>

  <div class="page-wrap taxi-page">

    <!-- Header -->
    <header class="page-header">
      <!-- <a class="logo" href="home.html">
        <div class="logo-icon">🐾</div>
        <span class="logo-text">PawPatrol</span>
      </a> -->
      <a class="back-link" href="home.html">← Back</a>
      <a href="home.html" style="color:var(--gray-400);font-size:1.4rem;text-decoration:none;">🏠</a>
    </header>

    <main class="page-content">

      <!-- Back -->

      <!-- Hero Banner -->
      <div class="taxi-hero reveal">
        <div class="taxi-hero-text">
          <span class="taxi-tag">🚕 Pet Transport</span>
          <h1 class="taxi-title">Pet Taxi</h1>
          <p class="taxi-sub">Safe rides for your furry friends.</p>
        </div>
        <div class="taxi-hero-emoji">🚖🐕🐈</div>
      </div>

      <!-- Where are we going? -->
      <div class="form-card reveal">
        <p class="form-card-title">Where are we going?</p>

        <div class="location-input-card">
          <span class="loc-pin">📍</span>
          <div class="loc-text">
            <p class="loc-label">Pickup Location</p>
            <input class="loc-input" id="pickup" type="text" placeholder="Enter pickup address">
          </div>
          <span class="nav-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
        </div>

        <div class="location-input-card">
          <span class="loc-pin">🏁</span>
          <div class="loc-text">
            <p class="loc-label">Destination</p>
            <input class="loc-input" id="destination" type="text" placeholder="Enter destination address">
          </div>
          <span class="nav-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Date & Time -->
      <div class="form-card reveal">
        <p class="form-card-title">Date &amp; Time</p>
        <div class="date-card">
          <span class="cal-icon">📅</span>
          <input class="date-input" id="taxi-date" type="datetime-local">
        </div>
      </div>

      <!-- Pet Type -->
      <div class="form-card reveal">
        <p class="form-card-title">Pet Type</p>
        <select class="pet-select" id="pet-type">
          <option value="">Select your pet...</option>
          <option value="dog">🐕 Dog</option>
          <option value="cat">🐈 Cat</option>
          <option value="rabbit">🐇 Rabbit</option>
          <option value="bird">🦜 Bird</option>
          <option value="other">🐾 Other</option>
        </select>
      </div>

      <!-- Choose Ride Type -->
      <div class="form-card reveal">
        <p class="form-card-title">Choose Ride Type</p>
        <div class="ride-cards">
          <div class="ride-card selected">
            <span class="ride-emoji">🚕</span>
            <p class="ride-title">Pet Standard</p>
            <p class="ride-desc">Cozy ride for small to medium pets</p>
            <p class="ride-price">From $10</p>
          </div>
          <div class="ride-card">
            <span class="ride-emoji">🚐</span>
            <p class="ride-title">Pet XL</p>
            <p class="ride-desc">Spacious ride for large pets</p>
            <p class="ride-price">From $18</p>
          </div>
        </div>
      </div>

      <!-- Book CTA -->
      <button class="book-taxi-btn">🐾 Book Pet Taxi</button>

    </main>

  </div>

  <script src="../js/app.js"></script>
</body>
</html>
