<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPatrol</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/taxi.css">
</head>
<body>

  <div class="page-wrap taxi-page">

    <!-- Header -->
    <header class="page-header">
      <a class="back-link" href="home.html"><img style="transform: translateX(0.1px);" src="../assets/back.png" />Back</a>
      <a href="home.html">
        <img src="../assets/home.png" />
      </a>
    </header>

    <main class="page-content">

      <!-- Back -->

      <!-- Hero Banner -->
      <div class="taxi-hero reveal">
        <img src="../assets/taxi-foto.png" />
      </div>

      <!-- Where are we going? -->
      <div class="form-card reveal">
        <p class="form-card-title">Where are we going?</p>

        <div class="location-input-card">
          <span class="loc-pin"><div class="destination"></div></span>
          <div class="loc-text">
            <p class="loc-label">Pickup Location</p>
            <input class="loc-input" id="pickup" type="text" placeholder="Enter pickup address">
          </div>
          <span class="nav-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
        </div>

        <div class="location-input-card">
          <span class="loc-pin"><img src="../assets/place.png" /></span>
          <div class="loc-text">
            <p class="loc-label">Destination</p>
            <input class="loc-input" id="destination" type="text" placeholder="Enter destination address">
          </div>
          <span class="nav-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Date & Time -->
      <div class="form-card reveal">
        <p class="form-card-title">Date & Time</p>
        <div class="date-card">
          <input class="date-input" id="taxi-date" type="datetime-local">
        </div>
      </div>

      <!-- Pet Type -->
      <div class="form-card reveal">
        <p class="form-card-title">Pet Type</p>
        <select class="pet-select" id="pet-type">
          <option value="">Select your pet...</option>
          <option value="dog">Dog</option>
          <option value="cat">Cat</option>
          <option value="other">Other</option>
        </select>
      </div>

      <!-- Choose Ride Type -->
      <div class="form-card reveal">
        <p class="form-card-title">Choose Ride Type</p>
        <div class="ride-cards">
          <div class="ride-card selected">
            <span class="ride-emoji"><img src="../assets/car.png" /></span>
            <p class="ride-title">Pet Standard</p>
            <p class="ride-desc">Cozy ride for small to medium pets</p>
            <p class="ride-price">Rp. 20.000</p>
          </div>
          <div class="ride-card">
            <span class="ride-emoji"><img src="../assets/bus.png" /></span>
            <p class="ride-title">Pet XL</p>
            <p class="ride-desc">Spacious ride for large pets</p>
            <p class="ride-price">Rp. 25.000</p>
          </div>
        </div>
      </div>

      <!-- Book CTA -->
      <button class="book-taxi-btn">Book Pet Taxi</button>

    </main>

  </div>

  <script src="../js/app.js"></script>
</body>
</html>
