<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawPatrol – Taxi Complete</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/taxi/complete.css">
</head>
<body>

  <div class="page-wrap tx-complete-page">

    <header class="tcx-header">
      <div class="tcx-spacer" aria-hidden="true"></div>
      <h1 class="tcx-title">Trip Completed</h1>
      <div class="tcx-spacer" aria-hidden="true"></div>
    </header>

    <main class="page-content tcx-content">

      <section class="tcx-success" aria-label="Trip completed">
        <div class="tcx-success-icon" aria-hidden="true">✓</div>
        <div class="tcx-success-headline">Trip Completed!</div>
        <div class="tcx-success-message">
          Thank you for using PawPatrol Pet Taxi. We hope your pet had a great ride!
        </div>
      </section>

      <section class="tcx-payment-card" aria-label="Payment summary">
        <div class="tcx-total">
          <div class="tcx-total-label">Total Price</div>
          <div class="tcx-total-value">Rp75.000</div>
        </div>

        <div class="tcx-divider" role="separator" aria-hidden="true"></div>

        <div class="tcx-method">
          <div class="tcx-method-left">
            <div class="tcx-method-logo" aria-hidden="true">💳</div>
            <div class="tcx-method-name">PayPal</div>
          </div>
          <div class="tcx-method-sub">Paid successfully</div>
        </div>
      </section>

      <button class="tcx-back-btn" type="button" aria-label="Back to history">
        Back
      </button>
    </main>

  </div>

  <script src="../js/app.js"></script>
</body>
</html>
